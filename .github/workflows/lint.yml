name: Lint

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out before running lint.
        required: false
        type: string
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev

      - name: Configure libclang on macOS
        if: runner.os == 'macOS'
        run: |
          echo "LIBCLANG_PATH=$(xcrun --find clang | xargs dirname)/../lib" >> "$GITHUB_ENV"

      - name: Install LLVM on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvmPath = if ($env:LLVM_PATH) { $env:LLVM_PATH } else { 'C:\Program Files\LLVM' }
          if (-not (Test-Path "$llvmPath\bin\libclang.dll")) {
            winget install --id LLVM.LLVM --exact --accept-source-agreements --accept-package-agreements
          }

      - name: Configure libclang on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvmPath = if ($env:LLVM_PATH -and (Test-Path "$env:LLVM_PATH\bin\libclang.dll")) { $env:LLVM_PATH } else { 'C:\Program Files\LLVM' }
          if (-not (Test-Path "$llvmPath\bin\libclang.dll")) {
            throw "libclang.dll was not found at $llvmPath\bin"
          }
          "LIBCLANG_PATH=$llvmPath\bin" >> $env:GITHUB_ENV

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

      - name: Verify package
        if: runner.os == 'Linux'
        run: cargo package --locked
